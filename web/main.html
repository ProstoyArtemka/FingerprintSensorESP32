<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fingerprint Viewer</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f0f0;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }
        canvas {
            background-color: #000;
            border: 2px solid #333;
            image-rendering: pixelated;
            margin-bottom: 15px;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #0056b3;
        }
        #status {
            margin-top: 10px;
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Fingerprint Scanner</h2>
        <canvas id="fpCanvas" width="256" height="288"></canvas>
        <div id="status">Ready</div>
        <br>
        <button onclick="fetchAndRender()">Update</button>
    </div>

    <script>
        async function fetchAndRender() {
            const status = document.getElementById('status');
            const canvas = document.getElementById('fpCanvas');
            const ctx = canvas.getContext('2d');
            
            status.innerText = "Getting image...";

            try {
                const response = await fetch('http://192.168.4.1/get-finger');
                
                const buffer = await response.arrayBuffer();
                const data = new Uint8Array(buffer);
                
                const imgData = ctx.createImageData(canvas.width, canvas.height);
                const pixels = imgData.data;

                let pIdx = 0;
                for (let i = 0; i < data.length; i++) {
                    const byte = data[i];

                    const p1 = (byte & 0xF0); 
                    pixels[pIdx++] = p1;
                    pixels[pIdx++] = p1;
                    pixels[pIdx++] = p1;
                    pixels[pIdx++] = 255;

                    const p2 = (byte & 0x0F) << 4;
                    pixels[pIdx++] = p2;
                    pixels[pIdx++] = p2;
                    pixels[pIdx++] = p2; 
                    pixels[pIdx++] = 255;
                }

                ctx.putImageData(imgData, 0, 0);
                status.innerText = "Success!";

            } catch (err) {
                status.innerText = "Error: " + err.message;
                console.error(err);
            }
        }
    </script>
</body>
</html>
